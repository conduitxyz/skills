name: Audit Skills

on:
  pull_request:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          pip install skill-audit
          skill-audit --help
          skill-audit ./skills/ --format sarif -o results.sarif --strict
      - uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: results.sarif