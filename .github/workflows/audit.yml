name: Audit Skills

on:
  pull_request:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: |
          pip install skill-audit
          skill-audit -f sarif -o results.sarif --strict ./skills/
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif